apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: docker-hub-ingress
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
    nginx.ingress.kubernetes.io/proxy-body-size: "500m"
spec:
  rules:
    - http:
        paths:
          # Route OCI simulator endpoints
          - path: /v2
            pathType: Prefix
            backend:
              service:
                name: backend-service
                port:
                  number: 5000
          # Route API endpoints
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: backend-service
                port:
                  number: 5000
          # Route WebSockets
          - path: /ws
            pathType: Prefix
            backend:
              service:
                name: backend-service
                port:
                  number: 5000
          # Default to frontend
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend-service
                port:
                  number: 3000
