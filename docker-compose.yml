version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: docker_hub_postgres
    restart: always
    environment:
      POSTGRES_USER: docker
      POSTGRES_PASSWORD: dockerpassword
      POSTGRES_DB: dockerhub
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    container_name: docker_hub_backend
    restart: always
    environment:
      - PORT=5000
      - DATABASE_URL=postgresql://docker:dockerpassword@db:5432/dockerhub?schema=public
      - JWT_SECRET=supersecretjwtdockerclonekey
      - JWT_REFRESH_SECRET=supersecretrefreshkey
    depends_on:
      - db
    # Automatically apply db push and seeding on start!
    command: >
      sh -c "npx prisma db push && npm run db:setup && npm run start"
    ports:
      - "5000:5000"

  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
    container_name: docker_hub_frontend
    restart: always
    environment:
      - PORT=3000
      - NODE_ENV=production
    depends_on:
      - backend
    ports:
      - "3000:3000"

  nginx:
    image: nginx:alpine
    container_name: docker_hub_nginx
    restart: always
    volumes:
      - ./infrastructure/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "80:80"
    depends_on:
      - frontend
      - backend

volumes:
  pgdata:
